name: expense_tracker
description: Camera-first expense tracker Flutter app
publish_to: 'none'
version: 0.1.0
environment:
  sdk: '>=2.18.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.1.1
  http: ^1.0.0
  provider: ^6.0.5
  image_picker: ^1.0.0
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.0
  photo_view: ^0.14.0
  intl: ^0.19.0
  uuid: ^4.0.0
  dio: ^5.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
